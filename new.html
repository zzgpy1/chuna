<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新作 · 墨韵集</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <nav class="glass-nav">
            <div class="nav-container">
                <a href="index.html" class="logo"><i class="fas fa-feather-alt"></i> 墨韵集</a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i> 首页</a>
                    <a href="new.html" class="nav-link active"><i class="fas fa-pen-fancy"></i> 写文章</a>
                </div>
            </div>
        </nav>

        <main class="main-content new-page">
            <div id="authPanel" class="auth-card">
                <!-- 登录/注册切换 -->
            </div>
            <div id="publishPanel" style="display:none;">
                <div class="post-editor">
                    <h2><i class="fas fa-feather"></i> 写一篇新文章</h2>
                    <input type="text" id="postTitle" placeholder="标题" class="title-input">
                    <textarea id="postContent" placeholder="使用 Markdown 编写内容..." rows="12"></textarea>
                    <div class="editor-actions">
                        <button id="publishBtn" class="btn-primary"><i class="fas fa-paper-plane"></i> 发布文章</button>
                        <button id="logoutBtn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
                    </div>
                    <div class="preview-hint"><i class="fas fa-eye"></i> 预览区域（实时 Markdown）</div>
                    <div id="livePreview" class="markdown-body"></div>
                </div>
            </div>
        </main>

        <div class="music-player" id="musicPlayer">
            <div class="music-btn" id="musicToggle">
                <i class="fas fa-music"></i>
                <i class="fas fa-play" style="display:none;"></i>
            </div>
            <div class="music-info">
                <span class="music-title">星河低语</span>
                <span class="music-artist">Lofi Chill</span>
            </div>
            <audio id="bgAudio" loop preload="auto">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/new.js"></script>
</body>
</html>
