<!-- 付款弹窗 -->
<div id="paymentModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl w-full max-w-md p-6"><h3 class="text-xl font-bold mb-4">新增付款</h3><form id="paymentForm"><select id="paySupplierId" required class="w-full border rounded-lg p-2 mb-3"><option value="">选择供应商</option></select><input type="number" id="payAmount" placeholder="付款金额" step="0.01" required class="w-full border rounded-lg p-2 mb-3"><input type="date" id="payDate" required class="w-full border rounded-lg p-2 mb-3"><textarea id="payNote" placeholder="备注" rows="2" class="w-full border rounded-lg p-2 mb-3"></textarea><div class="flex justify-end gap-2"><button type="button" id="closePayModal" class="px-3 py-1.5 border rounded-lg">取消</button><button type="submit" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg">创建付款(未确认)</button></div></form></div>
</div>

<script>
// ======================== 读取全局配置（来自 config.js） ========================
// 期待 window.APP_CONFIG 存在，格式 { USERNAME: "xxx", PASSWORD: "xxx" }
const APP_CONFIG = window.APP_CONFIG || { USERNAME: "admin", PASSWORD: "admin123" };
// 在登录界面显示当前默认凭据提示
document.getElementById("demoHint").innerText = `${APP_CONFIG.USERNAME} / ${APP_CONFIG.PASSWORD}`;

// ======================== IndexedDB 管理 ========================
let db = null;
const DB_NAME = "CashierDB";
const DB_VERSION = 3;

function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => { db = request.result; resolve(db); };
        request.onupgradeneeded = (e) => {
            const dbRef = e.target.result;
            if (!dbRef.objectStoreNames.contains("suppliers")) {
                const supplierStore = dbRef.createObjectStore("suppliers", { keyPath: "id", autoIncrement: true });
                supplierStore.createIndex("name", "name", { unique: false });
            }
            if (!dbRef.objectStoreNames.contains("accounts")) {
                const accStore = dbRef.createObjectStore("accounts", { keyPath: "id", autoIncrement: true });
                accStore.createIndex("supplierId", "supplierId");
            }
            if (!dbRef.objectStoreNames.contains("payments")) {
                const payStore = dbRef.createObjectStore("payments", { keyPath: "id", autoIncrement: true });
                payStore.createIndex("supplierId", "supplierId");
                payStore.createIndex("paymentDate", "paymentDate");
                payStore.createIndex("isConfirmed", "isConfirmed");
            }
        };
    });
}

// 通用CRUD
async function getAll(storeName) { return new Promise((res,rej)=>{ const tx=db.transaction(storeName,'readonly'), store=tx.objectStore(storeName), req=store.getAll(); req.onsuccess=()=>res(req.result); req.onerror=rej; }); }
async function saveItem(storeName, item) { return new Promise((res,rej)=>{ const tx=db.transaction(storeName,'readwrite'), store=tx.objectStore(storeName); let req; if(item.id) req=store.put(item); else req=store.add(item); req.onsuccess=()=>res(req.result); req.onerror=rej; }); }
async function deleteItem(storeName, id) { return new Promise((res,rej)=>{ const tx=db.transaction(storeName,'readwrite'), store=tx.objectStore(storeName), req=store.delete(id); req.onsuccess=()=>res(); req.onerror=rej; }); }
async function getByIndex(storeName, indexName, value) { return new Promise((res)=>{ const tx=db.transaction(storeName,'readonly'), store=tx.objectStore(storeName), index=store.index(indexName), req=index.getAll(value); req.onsuccess=()=>res(req.result); }); }

// 辅助获取供应商所有账户
async function getAccountsBySupplier(supplierId) { return await getByIndex("accounts", "supplierId", supplierId); }
async function updateSupplierPaidAmount(supplierId) {
    const payments = await getByIndex("payments", "supplierId", supplierId);
    const confirmedTotal = payments.filter(p => p.isConfirmed === true).reduce((sum,p)=>sum+(p.amount||0),0);
    const supplier = (await getAll("suppliers")).find(s=>s.id==supplierId);
    if(supplier) { supplier.totalPaidAmount = confirmedTotal; await saveItem("suppliers", supplier); }
    return confirmedTotal;
}

// 初始化示例数据
async function initMockData() {
    let suppliers = await getAll("suppliers");
    if(suppliers.length===0){
        const s1 = { name:"宏达钢材", products:"螺纹钢、线材", paymentType:"后付款", totalStorageAmount:125000, totalPaidAmount:0 };
        const s2 = { name:"宏远电子", products:"电容电阻PCB", paymentType:"预付款", totalStorageAmount:68000, totalPaidAmount:0 };
        const sid1 = await saveItem("suppliers", s1);
        const sid2 = await saveItem("suppliers", s2);
        await saveItem("accounts", { supplierId:sid1, accountName:"对公-宏达基本户", accountNumber:"6217****1234", bankName:"建设银行", accountType:"public" });
        await saveItem("accounts", { supplierId:sid2, accountName:"私用-张经理", accountNumber:"6212****5678", bankName:"招商银行", accountType:"private" });
        const today = new Date().toISOString().slice(0,10);
        await saveItem("payments", { supplierId:sid1, amount:35000, paymentDate:today, isConfirmed:false, note:"首笔预付款" });
        await saveItem("payments", { supplierId:sid2, amount:20000, paymentDate:today, isConfirmed:true, note:"预付款已确认" });
        await updateSupplierPaidAmount(sid1); await updateSupplierPaidAmount(sid2);
    }
}

// ========= UI全局变量 =========
let currentUser = null;
let suppliersCache = [];
let accountsCache = [];
let paymentsCache = [];

function requireLogin(){ return !!currentUser; }
async function renderAll() { await loadData(); renderDashboard(); renderSuppliers(); renderPayments(); renderStatFilters(); }
async function loadData(){ suppliersCache = await getAll("suppliers"); accountsCache = await getAll("accounts"); paymentsCache = await getAll("payments"); }
function formatMoney(v){ return "¥"+parseFloat(v).toFixed(2); }

// 仪表板
async function renderDashboard(){
    let totalStorage = suppliersCache.reduce((s,p)=>s+(p.totalStorageAmount||0),0);
    let totalPaid = suppliersCache.reduce((s,p)=>s+(p.totalPaidAmount||0),0);
    let totalDue = totalStorage - totalPaid;
    document.getElementById("statSupplierCount").innerText = suppliersCache.length;
    document.getElementById("statTotalStorage").innerHTML = formatMoney(totalStorage);
    document.getElementById("statTotalPaid").innerHTML = formatMoney(totalPaid);
    document.getElementById("statTotalDue").innerHTML = formatMoney(totalDue);
    let pending = paymentsCache.filter(p=>!p.isConfirmed);
    let container = document.getElementById("pendingConfirmList");
    if(pending.length===0) container.innerHTML='<div class="text-gray-400 text-center py-4">暂无待确认付款</div>';
    else container.innerHTML = pending.map(p=>{ let sup = suppliersCache.find(s=>s.id==p.supplierId); return `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg"><div><span class="font-medium">${sup?.name||'未知'}</span><span class="ml-3 text-indigo-600">${formatMoney(p.amount)}</span><div class="text-xs text-gray-400">${p.paymentDate}</div></div><button data-id="${p.id}" class="confirmPayBtn bg-green-100 text-green-700 px-3 py-1 rounded-md text-sm"><i class="fas fa-check-circle"></i> 确认打款</button></div>`}).join('');
    document.querySelectorAll('.confirmPayBtn').forEach(btn=>btn.addEventListener('click',async(e)=>{ let pid=parseInt(btn.dataset.id); await confirmPayment(pid); }));
}
async function confirmPayment(paymentId){
    let payment = paymentsCache.find(p=>p.id==paymentId);
    if(payment && !payment.isConfirmed){
        payment.isConfirmed = true;
        await saveItem("payments", payment);
        await updateSupplierPaidAmount(payment.supplierId);
        await loadData(); renderAll();
    }
}

// 供应商列表渲染
function renderSuppliers(){
    let container = document.getElementById("supplierListContainer");
    if(!container) return;
    container.innerHTML = suppliersCache.map(sup=>{
        let due = (sup.totalStorageAmount||0) - (sup.totalPaidAmount||0);
        return `<div class="bg-white rounded-xl shadow p-4 card-hover border border-gray-100"><div class="flex justify-between"><div><h3 class="font-bold text-lg">${sup.name}</h3><p class="text-sm text-gray-500">📦 ${sup.products||'未填写'} | 💳 ${sup.paymentType}</p><div class="mt-2 grid grid-cols-2 gap-2 text-sm"><span>入库: ${formatMoney(sup.totalStorageAmount)}</span><span>实付: ${formatMoney(sup.totalPaidAmount)}</span><span class="text-amber-600">欠款: ${formatMoney(due)}</span></div></div><div class="flex flex-col gap-1"><button data-id="${sup.id}" class="editSupplierBtn text-indigo-600 text-sm"><i class="fas fa-edit"></i> 编辑</button><button data-id="${sup.id}" class="viewAccountBtn text-gray-500 text-sm"><i class="fas fa-university"></i> 账户</button><button data-id="${sup.id}" class="quickPayBtn text-emerald-600 text-sm"><i class="fas fa-hand-holding-usd"></i> 打款</button></div></div></div>`;
    }).join('');
    document.querySelectorAll('.editSupplierBtn').forEach(btn=>btn.addEventListener('click',()=>openSupplierModal(parseInt(btn.dataset.id))));
    document.querySelectorAll('.quickPayBtn').forEach(btn=>btn.addEventListener('click',()=>quickAddPayment(parseInt(btn.dataset.id))));
    document.querySelectorAll('.viewAccountBtn').forEach(btn=>btn.addEventListener('click',async()=>{ let id=parseInt(btn.dataset.id); let accs=await getAccountsBySupplier(id); alert(accs.map(a=>`${a.accountName} (${a.accountType=="public"?"对公":"私用"}): ${a.accountNumber} ${a.bankName}`).join('\n')||"暂无账户"); }));
}
function quickAddPayment(supId){ document.getElementById("paySupplierId").value=supId; document.getElementById("paymentModal").classList.remove("hidden"); }
// 付款列表
async function renderPayments(){
    let filterSup = document.getElementById("filterSupplierPay").value;
    let filtered = filterSup=="all"? paymentsCache : paymentsCache.filter(p=>p.supplierId == filterSup);
    let tbody = document.getElementById("paymentsTbody");
    tbody.innerHTML = filtered.map(p=>{ let sup = suppliersCache.find(s=>s.id==p.supplierId); return `<tr class="border-b"><td class="px-4 py-2">${sup?.name||'已删除'}</td><td class="px-4 py-2">${formatMoney(p.amount)}</td><td class="px-4 py-2">${p.paymentDate}</td><td class="px-4 py-2">${p.isConfirmed?'<span class="text-green-600 bg-green-50 px-2 py-0.5 rounded-full text-xs">已确认</span>':'<span class="text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full text-xs">待确认</span>'}</td><td class="px-4 py-2">${p.note||'—'}</td><td class="px-4 py-2 text-center">${!p.isConfirmed?`<button data-id="${p.id}" class="confirmSinglePay text-green-600 mr-2"><i class="fas fa-check"></i> 确认</button>`:''}<button data-id="${p.id}" class="delPayBtn text-red-400"><i class="fas fa-trash-alt"></i></button></td></tr>`; }).join('');
    document.querySelectorAll('.confirmSinglePay').forEach(btn=>btn.addEventListener('click',async()=>{ await confirmPayment(parseInt(btn.dataset.id)); renderAll(); }));
    document.querySelectorAll('.delPayBtn').forEach(btn=>btn.addEventListener('click',async()=>{ if(confirm("删除付款记录?")){ await deleteItem("payments", parseInt(btn.dataset.id)); await loadData(); renderAll(); }}));
}
function renderStatFilters(){
    let opts = `<option value="all">所有供应商</option>`+suppliersCache.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById("statSupplierFilter").innerHTML = opts;
    document.getElementById("filterSupplierPay").innerHTML = opts;
}
async function queryStatistics(){
    let periodType = document.getElementById("queryPeriodType").value;
    let periodRaw = document.getElementById("periodValue").value;
    let supplierId = document.getElementById("statSupplierFilter").value;
    let filtered = paymentsCache.filter(p=>supplierId=="all" || p.supplierId==parseInt(supplierId));
    let groupMap = new Map();
    filtered.forEach(p=>{
        let date = new Date(p.paymentDate);
        let key;
        if(periodType==="day") key = p.paymentDate;
        else if(periodType==="month") key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
        else key = `${date.getFullYear()}`;
        if(periodRaw && key!==periodRaw) return;
        if(!groupMap.has(key)) groupMap.set(key,0);
        groupMap.set(key, groupMap.get(key)+p.amount);
    });
    let labels = Array.from(groupMap.keys()), data = Array.from(groupMap.values());
    let ctx = document.getElementById("statChart").getContext("2d");
    if(window.statChartInstance) window.statChartInstance.destroy();
    window.statChartInstance = new Chart(ctx, { type:'bar', data:{ labels, datasets:[{ label:'付款金额(¥)', data, backgroundColor:'#6366f1' }] } });
    let total = data.reduce((a,b)=>a+b,0);
    document.getElementById("statTotalAmount").innerHTML = `合计付款: ${formatMoney(total)}`;
    let detailHtml = filtered.filter(p=>!periodRaw|| (periodType==="day"?p.paymentDate===periodRaw: true)).map(p=>{ let s=suppliersCache.find(s=>s.id==p.supplierId); return `<div class="flex justify-between border-b py-1"><span>${s?.name}</span><span>${formatMoney(p.amount)}</span><span class="text-gray-400 text-xs">${p.paymentDate}</span></div>`; }).join('');
    document.getElementById("statDetailList").innerHTML = detailHtml || "<div class='text-gray-400'>无数据</div>";
}

// 供应商弹窗与账户动态管理
let currentEditSupplierId = null;
function openSupplierModal(id=null){
    currentEditSupplierId = id;
    document.getElementById("modalTitle").innerText = id?"编辑供应商":"新增供应商";
    if(id){
        let sup = suppliersCache.find(s=>s.id==id);
        document.getElementById("supplierId").value = sup.id;
        document.getElementById("supName").value = sup.name;
        document.getElementById("supProducts").value = sup.products||"";
        document.getElementById("supPayType").value = sup.paymentType;
        document.getElementById("supStorage").value = sup.totalStorageAmount;
        document.getElementById("supPaid").value = sup.totalPaidAmount;
        loadAccountsForSupplier(id);
    } else {
        document.getElementById("supplierForm").reset();
        document.getElementById("supplierId").value="";
        document.getElementById("supPaid").value=0;
        document.getElementById("accountsList").innerHTML="";
    }
    document.getElementById("supplierModal").classList.remove("hidden");
}
async function loadAccountsForSupplier(supId){
    let accs = await getAccountsBySupplier(supId);
    let container = document.getElementById("accountsList");
    container.innerHTML = accs.map((acc,idx)=>`<div class="flex gap-2 mb-2 items-center"><input type="text" placeholder="账户名" value="${acc.accountName}" class="border p-1 rounded text-sm w-1/3"><input placeholder="账号" value="${acc.accountNumber}" class="border p-1 rounded text-sm w-1/3"><input placeholder="开户行" value="${acc.bankName}" class="border p-1 rounded text-sm w-1/4"><select class="border p-1 rounded text-sm"><option ${acc.accountType=="public"?"selected":""} value="public">对公</option><option ${acc.accountType=="private"?"selected":""} value="private">私用</option></select><button type="button" class="removeAccountBtn text-red-500" data-idx="${idx}"><i class="fas fa-trash"></i></button></div>`).join('');
    document.querySelectorAll(".removeAccountBtn").forEach(btn=>btn.addEventListener("click",async()=>{ let idx = parseInt(btn.dataset.idx); let delAcc = accs[idx]; if(delAcc) await deleteItem("accounts",delAcc.id); loadAccountsForSupplier(supId); }));
}
document.getElementById("addAccountBtn")?.addEventListener("click",()=>{ let container = document.getElementById("accountsList"); container.insertAdjacentHTML('beforeend',`<div class="flex gap-2 mb-2"><input placeholder="新账户名" class="border p-1 rounded text-sm w-1/3"><input placeholder="账号" class="border p-1 rounded text-sm w-1/3"><input placeholder="开户行" class="border p-1 rounded text-sm w-1/4"><select><option value="public">对公</option><option value="private">私用</option></select><button type="button" class="removeTemp text-red-500"><i class="fas fa-minus-circle"></i></button></div>`); });
document.getElementById("supplierForm")?.addEventListener("submit",async(e)=>{
    e.preventDefault();
    let id = document.getElementById("supplierId").value;
    let supData = { name:document.getElementById("supName").value, products:document.getElementById("supProducts").value, paymentType:document.getElementById("supPayType").value, totalStorageAmount:parseFloat(document.getElementById("supStorage").value)||0, totalPaidAmount:parseFloat(document.getElementById("supPaid").value)||0 };
    let savedId;
    if(id){ supData.id=parseInt(id); await saveItem("suppliers", supData); savedId=supData.id; }
    else savedId = await saveItem("suppliers", supData);
    // 保存账户列表(简易覆盖)
    let existingAccs = await getAccountsBySupplier(savedId);
    for(let acc of existingAccs) await deleteItem("accounts", acc.id);
    let accDivs = document.querySelectorAll("#accountsList > div");
    for(let div of accDivs){
        let inputs = div.querySelectorAll("input,select");
        if(inputs.length>=4){
            let accName=inputs[0]?.value, accNum=inputs[1]?.value, bank=inputs[2]?.value, type=inputs[3]?.value;
            if(accName) await saveItem("accounts",{ supplierId:savedId, accountName:accName, accountNumber:accNum, bankName:bank, accountType:type });
        }
    }
    await loadData(); renderAll(); document.getElementById("supplierModal").classList.add("hidden");
});

// 登录及初始化
window.onload = async()=>{
    await openDB();
    await initMockData();
    await loadData();
    document.getElementById("doLoginBtn").onclick = ()=>{
        let user = document.getElementById("loginUsername").value;
        let pwd = document.getElementById("loginPassword").value;
        if(user===APP_CONFIG.USERNAME && pwd===APP_CONFIG.PASSWORD){
            currentUser = user;
            document.getElementById("loginContainer").classList.add("hidden");
            document.getElementById("appContainer").classList.remove("hidden");
            document.getElementById("currentUserSpan").innerText = user;
            renderAll();
        } else alert("用户名或密码错误，请检查 config.js 中的配置");
    };
    document.getElementById("logoutBtn").onclick = ()=>{ currentUser=null; document.getElementById("loginContainer").classList.remove("hidden"); document.getElementById("appContainer").classList.add("hidden"); };
    document.getElementById("addPaymentBtn").onclick = ()=>{ document.getElementById("paySupplierId").innerHTML = '<option value="">选择供应商</option>'+suppliersCache.map(s=>`<option value="${s.id}">${s.name}</option>`).join(''); document.getElementById("paymentModal").classList.remove("hidden"); };
    document.getElementById("closePayModal").onclick = ()=>document.getElementById("paymentModal").classList.add("hidden");
    document.getElementById("paymentForm").onsubmit = async(e)=>{ e.preventDefault(); let sid=parseInt(document.getElementById("paySupplierId").value); let amount=parseFloat(document.getElementById("payAmount").value); let date=document.getElementById("payDate").value; let note=document.getElementById("payNote").value; if(sid&&amount){ await saveItem("payments",{ supplierId:sid, amount, paymentDate:date, isConfirmed:false, note }); await loadData(); renderAll(); document.getElementById("paymentModal").classList.add("hidden");} };
    document.getElementById("queryStatBtn").onclick = queryStatistics;
    document.getElementById("refreshPaymentsBtn").onclick = ()=>{ renderPayments(); };
    document.getElementById("addSupplierBtn").onclick = ()=>openSupplierModal(null);
    document.getElementById("closeModalBtn").onclick = ()=>document.getElementById("supplierModal").classList.add("hidden");
    document.getElementById("cancelModalBtn").onclick = ()=>document.getElementById("supplierModal").classList.add("hidden");
    document.querySelectorAll(".tab-btn").forEach(btn=>{ btn.onclick = ()=>{ let target = btn.dataset.tab; document.querySelectorAll(".tab-panel").forEach(panel=>panel.classList.add("hidden")); document.getElementById(`${target}Panel`).classList.remove("hidden"); document.querySelectorAll(".tab-btn").forEach(t=>t.classList.remove("border-b-2","border-indigo-500","text-indigo-600")); btn.classList.add("border-b-2","border-indigo-500","text-indigo-600"); if(target==="statistics") queryStatistics(); }; });
    document.querySelector(".tab-btn").click();
};
</script>
