<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静思日志 · 个人博客</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">📖 静思日志</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="admin.html" class="nav-link">管理后台</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="music-player">
                <button id="musicToggle" class="music-btn">🎵 播放背景音乐</button>
                <audio id="bgAudio" loop preload="none">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
            </div>

            <header class="hero">
                <h1>笔墨之间 · 静观万象</h1>
                <p>记录思考，分享灵感 | 自动排版，纯净阅读</p>
            </header>

            <div id="postsContainer" class="posts-grid">
                <div class="loading-state">✨ 加载文章之中...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 静思日志 | 由 GitHub Actions 优雅驱动</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔧 请替换为您的 Firebase 项目配置（在 Firebase 控制台 → 项目设置 → 常规 → 您的应用中找到）
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPosts() {
            const container = document.getElementById('postsContainer');
            container.innerHTML = '<div class="loading-state">📖 正在翻阅时光...</div>';
            try {
                const q = query(collection(db, "posts"), where("published", "==", true), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty-msg">✨ 暂无文章，管理员即将带来精彩内容～</div>';
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const date = post.createdAt?.toDate ? post.createdAt.toDate() : new Date();
                    const dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
                    const plainSummary = post.content.replace(/#/g, '').replace(/\*\*/g, '').slice(0, 120) + (post.content.length > 120 ? '……' : '');
                    html += `
                        <article class="post-card">
                            <div class="post-meta">
                                <span>📅 ${dateStr}</span>
                                <span>👁️ ${post.count || 0} 次阅读</span>
                            </div>
                            <h2 class="post-title">${escapeHtml(post.title)}</h2>
                            <p class="post-summary">${escapeHtml(plainSummary)}</p>
                            <a href="post.html?id=${doc.id}" class="read-more">阅读全文 →</a>
                        </article>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<div class="empty-msg">❌ 加载失败，请检查网络或Firebase配置</div>';
                console.error(err);
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 背景音乐
        const audio = document.getElementById('bgAudio');
        const toggleBtn = document.getElementById('musicToggle');
        let playing = false;
        toggleBtn.addEventListener('click', () => {
            if (playing) {
                audio.pause();
                toggleBtn.innerHTML = '🎵 播放背景音乐';
            } else {
                audio.play().catch(e => console.log);
                toggleBtn.innerHTML = '🔇 暂停音乐';
            }
            playing = !playing;
        });

        loadPosts();
    </script>
</body>
</html>
