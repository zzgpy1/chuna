name: Encrypt and Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Staticrypt
        run: npm install -g staticrypt

      - name: Encrypt main.html
        run: |
          # 检查 main.html 是否存在
          if [ ! -f "main.html" ]; then
            echo "❌ main.html not found!"
            exit 1
          fi
          # 检查密码 Secret 是否设置
          if [ -z "${{ secrets.LOGIN_PASSWORD }}" ]; then
            echo "❌ LOGIN_PASSWORD secret is not set!"
            exit 1
          fi
          # 执行加密
          staticrypt main.html \
            --passphrase "${{ secrets.LOGIN_PASSWORD }}" \
            --template-title "出纳管理系统" \
            --template-instructions "请输入访问密码" \
            --short \
            -o index.html
          # 验证 index.html 已生成
          if [ ! -f "index.html" ]; then
            echo "❌ index.html was not generated!"
            exit 1
          fi
          echo "✅ index.html generated successfully"
          ls -la

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
