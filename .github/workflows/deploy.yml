name: Encrypt and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Staticrypt
        run: npm install -g staticrypt

      - name: Encrypt HTML with GitHub Secret
        # 密码从 GitHub Secrets 中读取，安全且不暴露
        run: |
          staticrypt main.html \
            --passphrase "${{ secrets.STATICRYPT_PASSWORD }}" \
            --template-title "出纳管理系统 · 登录验证" \
            --template-instructions "请输入访问密码，密码由管理员提供。" \
            --template-button "验证进入" \
            --remember 72 \
            --short \
            -o index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
