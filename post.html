<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 · 静思日志</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .post-detail { background: white; border-radius: 32px; padding: 2rem; margin: 2rem 0; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .markdown-body { font-size: 1.05rem; line-height: 1.7; }
        .post-header { border-bottom: 1px solid #eef2f6; margin-bottom: 2rem; padding-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="container nav-container"><a href="index.html" class="logo">📖 静思日志</a><div class="nav-links"><a href="index.html">首页</a><a href="admin.html">管理后台</a></div></div></nav>
    <main class="main-content"><div class="container" id="postContainer"><div class="loading-state">加载中...</div></div></main>
    <footer class="footer"><div class="container"><p>© 2025 静思日志</p></div></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const container = document.getElementById('postContainer');

        if (!postId) {
            container.innerHTML = '<div class="empty-msg">无效的文章链接</div>';
        } else {
            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            if (!postSnap.exists() || !postSnap.data().published) {
                container.innerHTML = '<div class="empty-msg">文章不存在或未发布</div>';
            } else {
                const post = postSnap.data();
                // 增加阅读计数
                await updateDoc(postRef, { count: increment(1) });
                const date = post.createdAt?.toDate() || new Date();
                const dateStr = date.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
                const htmlContent = marked.parse(post.content);
                container.innerHTML = `
                    <div class="post-detail">
                        <div class="post-header">
                            <h1>${escapeHtml(post.title)}</h1>
                            <div class="post-meta" style="margin-top:10px;"><span>📅 ${dateStr}</span> <span>👁️ ${(post.count||0)+1} 次阅读</span></div>
                        </div>
                        <div class="markdown-body">${htmlContent}</div>
                    </div>
                `;
            }
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }
    </script>
</body>
</html>
