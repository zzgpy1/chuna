<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>墨韵博客 · 静思小筑</title>
    <!-- 引入字体 & 图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 代码高亮主题 (github风格) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <!-- 公共样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 顶栏导航 -->
        <nav class="glass-nav">
            <div class="nav-container">
                <a href="index.html" class="logo"><i class="fas fa-feather-alt"></i> 墨韵集</a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i> 首页</a>
                    <a href="new.html" class="nav-link"><i class="fas fa-pen-fancy"></i> 写文章</a>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="hero-section">
                <h1 class="hero-title">笔下千秋 <span class="hero-wave">✨</span></h1>
                <p class="hero-sub">记录思考 · 分享光阴</p>
            </div>
            <!-- 文章列表容器 -->
            <div class="posts-grid" id="postsContainer">
                <div class="loading-skeleton"><i class="fas fa-spinner fa-pulse"></i> 正在拾取星光...</div>
            </div>
        </main>

        <!-- 浮动音乐组件 -->
        <div class="music-player" id="musicPlayer">
            <div class="music-btn" id="musicToggle">
                <i class="fas fa-music"></i>
                <i class="fas fa-play" style="display:none;"></i>
            </div>
            <div class="music-info">
                <span class="music-title">星河低语</span>
                <span class="music-artist">Chill Lofi</span>
            </div>
            <audio id="bgAudio" loop preload="auto">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                您的浏览器不支持音频。
            </audio>
        </div>
    </div>

    <!-- 脚本库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
